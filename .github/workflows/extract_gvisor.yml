name: Extract Independent GVisor Netstack

on:
  workflow_dispatch:

env:
  GVISOR_VERSION: "release-20260622.0"
  MODULE_NAME: "github.com/oukishu/onet"

jobs:
  extract-netstack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Clone specific gVisor release branch
        run: |
          echo "Cloning gVisor version: ${{ env.GVISOR_VERSION }}"
          git clone --depth 1 --branch ${{ env.GVISOR_VERSION }} https://github.com/google/gvisor.git gvisor_src

      - name: Extract required core packages
        run: |
          mkdir -p gvisor
          CORE_PKGS=(
            "tcpip" "buffer" "atomicbitops" "waiter" "log" "ilist" "sync"
            "gohacks" "bits" "rand" "linewriter" "sleep" "rawfile" 
            "cleanup" "eventfd" "memutil" "context" "errors" "xdp" 
            "abi" "marshal" "syserr" "refs" "hostarch" "safecopy"
            "sighandling" "sentry/uniqueid" "cpuid" "goid" "segment"
          )
          
          for pkg in "${CORE_PKGS[@]}"; do
            if [ -d "gvisor_src/pkg/$pkg" ]; then
              echo "Extracting pkg/$pkg -> gvisor/$pkg"
              mkdir -p "gvisor/$(dirname $pkg)"
              cp -r "gvisor_src/pkg/$pkg" "gvisor/$pkg"
            fi
          done

      - name: Clone and localized btree and go-cmp
        run: |
          echo "Cloning btree into gvisor/btree..."
          git clone --depth 1 https://github.com/google/btree.git gvisor/btree
          rm -rf gvisor/btree/.git gvisor/btree/go.mod gvisor/btree/go.sum gvisor/btree/*_test.go
          
          echo "Cloning go-cmp into gvisor/go-cmp..."
          git clone --depth 1 https://github.com/google/go-cmp.git gvisor/go-cmp
          rm -rf gvisor/go-cmp/.git gvisor/go-cmp/go.mod gvisor/go-cmp/go.sum gvisor/go-cmp/*_test.go

      - name: Build go_generics tool and generate code
        run: |
          echo "Building gVisor go_generics tool..."
          cd gvisor_src/tools/go_generics
          go build -o ../../../go_generics .
          cd ../../../
          
          echo "Generating missing intrusive list and reference tracking code for buffer..."
          ./go_generics -i gvisor/ilist/list.go -o gvisor/buffer/view_list.go -p buffer -t Element=*View -t Linker=vlist -t List=ViewList -t Entry=ViewEntry
          ./go_generics -i gvisor/refs/refcounter.go -o gvisor/buffer/chunk_refs.go -p buffer -t T=chunk -t refs=chunkRefs -t RefCounter=chunkRefs
          
          echo "Generating missing intrusive list for waiter package..."
          ./go_generics \
            -i gvisor/ilist/list.go \
            -o gvisor/waiter/waiter_list.go \
            -p waiter \
            -t Element=*Waiter \
            -t Linker=waiterList \
            -t List=waiterList \
            -t Entry=waiterEntry
          
          echo "Writing bulletproof AddrRange definition directly to hostarch..."
          cat << 'EOF' > gvisor/hostarch/addr_range.go
          package hostarch

          // AddrRange represents a continuous range of virtual addresses [Start, End).
          type AddrRange struct {
              Start Addr
              End   Addr
          }

          // Length returns the size of the range.
          func (r AddrRange) Length() uint64 {
              if r.End < r.Start {
                  return 0
              }
              return uint64(r.End - r.Start)
          }

          // Contains returns true if the address 'a' lies within [Start, End).
          func (r AddrRange) Contains(a Addr) bool {
              return a >= r.Start && a < r.End
          }

          // IsValid returns true if Start <= End.
          func (r AddrRange) IsValid() bool {
              return r.Start <= r.End
          }

          // Intersect returns the intersection of two ranges.
          func (r AddrRange) Intersect(other AddrRange) AddrRange {
              start := r.Start
              if other.Start > start {
                  start = other.Start
              }
              end := r.End
              if other.End < end {
                  end = other.End
              }
              if start < end {
                  return AddrRange{Start: start, End: end}
              }
              return AddrRange{}
          }
          EOF
            
          echo "Redirecting generated imports back to buffer package..."
          find gvisor/buffer/ -type f -name "*.go" -exec sed -i "s|${{ env.MODULE_NAME }}/gvisor/buffer/vlist|${{ env.MODULE_NAME }}/gvisor/buffer|g" {} +
          find gvisor/buffer/ -type f -name "*.go" -exec sed -i "s|gvisor.dev/gvisor/pkg/buffer/vlist|${{ env.MODULE_NAME }}/gvisor/buffer|g" {} +

          rm -f go_generics

      - name: Clean up temporary source data
        run: |
          rm -rf gvisor_src

      - name: Purge tests and align Template Packages
        run: |
          echo "Purging unit tests and aligning template packages..."
          find gvisor/ -type f \( -name "*_test.go" -o -name "*.pb.go" \) -delete
          find gvisor/ -type f -name "*.tmpl.s" -delete
          
          rm -f gvisor/hostarch/range.go
          rm -f gvisor/hostarch/set.go
          rm -f gvisor/hostarch/set_state.go
          rm -rf gvisor/segment
          
          find gvisor/bits/ -type f -name "*_template.go" -exec sed -i 's|package bits_template|package bits|g' {} +
          find gvisor/refs/ -type f -name "*_template.go" -exec sed -i 's|package refs_template|package refs|g' {} +
          find gvisor/hostarch/ -type f -name "*.go" -exec sed -i 's|package addr_range|package hostarch|g' {} +
          
          
          rm -rf gvisor/tcpip/tests
          rm -rf gvisor/tcpip/testing
          rm -rf gvisor/tcpip/transport/testing
          rm -rf gvisor/tcpip/transport/tcp/test
          rm -rf gvisor/tcpip/nftables

      - name: Repair and replace package import paths
        run: |
          echo "Detected local module name: ${{ env.MODULE_NAME }}"
          
          TARGET_DIR="gvisor"
          
          find "$TARGET_DIR" -type f -name "*.go" -exec sed -i "s|gvisor.dev/gvisor/pkg|${MODULE_NAME}/gvisor|g" {} +
          find "$TARGET_DIR" -type f -name "*.go" -exec sed -i "s|github.com/google/btree|${MODULE_NAME}/gvisor/btree|g" {} +
          find "$TARGET_DIR" -type f -name "*.go" -exec sed -i "s|github.com/google/go-cmp|${MODULE_NAME}/gvisor/go-cmp|g" {} +

      - name: Explicitly fetch standard platform extensions
        run: |
          echo "Fetching remaining standard extensions (golang.org/x/...)..."
          go get golang.org/x/sys
          go get golang.org/x/time
          go get golang.org/x/exp
          
          echo "Running module tree tidying..."
          go mod tidy -v

      - name: Sanity check compilation
        run: |
          echo "Verifying local netstack structure compilation..."
          go build -v ./gvisor/tcpip/... || echo "Notice: Some platform-specific files may need tags or stubs."

      - name: Upload netstack artifact for direct download
        uses: actions/upload-artifact@v4
        with:
          name: gvisor-${{ env.GVISOR_VERSION }}-sanitized-netstack
          path: gvisor/