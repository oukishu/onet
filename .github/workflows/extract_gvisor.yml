name: Extract Independent GVisor Netstack

on:
  workflow_dispatch:

env:
  GVISOR_VERSION: "release-20260622.0"
  MODULE_NAME: "github.com/oukishu/onet"

jobs:
  extract-netstack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Clone specific gVisor release branch
        run: |
          echo "Cloning gVisor version: ${{ env.GVISOR_VERSION }}"
          git clone --depth 1 --branch ${{ env.GVISOR_VERSION }} https://github.com/google/gvisor.git gvisor_src

      - name: Extract required core packages
        run: |
          rm -rf gvisor
          mkdir -p gvisor
          CORE_PKGS=(
            "tcpip" "buffer" "atomicbitops" "waiter" "log" "ilist" "sync"
            "gohacks" "bits" "rand" "linewriter" "sleep" "rawfile" 
            "cleanup" "eventfd" "memutil" "context" "errors" "xdp" 
            "abi" "marshal" "syserr" "refs" "hostarch" "safecopy"
            "sighandling" "sentry/uniqueid" "cpuid" "goid" "segment"
          )
          
          for pkg in "${CORE_PKGS[@]}"; do
            SRC_DIR="gvisor_src/pkg/$pkg"
            DST_DIR="gvisor/$pkg"
            if [ -d "$SRC_DIR" ]; then
              echo "Extracting pkg/$pkg -> $DST_DIR"
              mkdir -p "$DST_DIR"
              cp -r "$SRC_DIR"/. "$DST_DIR/"
            fi
          done

      - name: Clone and localized btree and go-cmp
        run: |
          echo "Cloning btree into gvisor/btree..."
          git clone --depth 1 https://github.com/google/btree.git gvisor/btree
          rm -rf gvisor/btree/.git gvisor/btree/go.mod gvisor/btree/go.sum gvisor/btree/*_test.go
          
          echo "Cloning go-cmp into gvisor/go-cmp..."
          git clone --depth 1 https://github.com/google/go-cmp.git gvisor/go-cmp
          rm -rf gvisor/go-cmp/.git gvisor/go-cmp/go.mod gvisor/go-cmp/go.sum gvisor/go-cmp/*_test.go

      - name: Global Repair and replace package import paths
        run: |
          echo "Executing global framework redirection to local module: ${{ env.MODULE_NAME }}"
          TARGET_DIR="gvisor"
          find "$TARGET_DIR" -type f -name "*.go" -exec sed -i "s|gvisor.dev/gvisor/pkg|${{ env.MODULE_NAME }}/gvisor|g" {} +
          find "$TARGET_DIR" -type f -name "*.go" -exec sed -i "s|github.com/google/btree|${{ env.MODULE_NAME }}/gvisor/btree|g" {} +
          find "$TARGET_DIR" -type f -name "*.go" -exec sed -i "s|github.com/google/go-cmp|${{ env.MODULE_NAME }}/gvisor/go-cmp|g" {} +

      - name: Build go_generics tool and run full instantiation
        run: |
          echo "Building gVisor go_generics tool..."
          cd gvisor_src/tools/go_generics
          go build -o ../../../go_generics .
          cd ../../../
          
          # Remove platform-specific conflicting files
          rm -f gvisor/hostarch/range.go
          rm -f gvisor/hostarch/set.go
          rm -f gvisor/hostarch/set_state.go
          
          echo "========================================================"
          echo "1. Run go_generics instantiation matching 20260622 specs"
          echo "========================================================"
          
          # Instantiate buffer/view_list.go (Fixes: type *View has no field or method Next)
          ./go_generics -i gvisor_src/pkg/ilist/list.go -o gvisor/buffer/view_list.go -p buffer -t "Element=*View" -t "Linker=*View" -t "List=ViewList" -t "Entry=ViewEntry"
          
          # Instantiate buffer/chunk_refs.go (Fixes: undefined: chunkRefs)
          ./go_generics -i gvisor_src/pkg/refs/refcounter.go -o gvisor/buffer/chunk_refs.go -p buffer -t "T=chunk" -t "refs=chunkRefs" -t "RefCounter=chunkRefs"

          # Instantiate waiter/waiter_list.go (Fixes: undefined: waiterList)
          ./go_generics -i gvisor_src/pkg/ilist/list.go -o gvisor/waiter/waiter_list.go -p waiter -t "Element=*Entry" -t "Linker=*Entry" -t "List=waiterList" -t "Entry=waiterEntry"

          echo "========================================================"
          echo "2. Sanitize files: Strip intrusive template package prefixes"
          echo "========================================================"
          # Force correct package names to prevent tool-generated '_template' sub-packages
          sed -i 's/^package.*/package buffer/g' gvisor/buffer/view_list.go
          sed -i 's/^package.*/package buffer/g' gvisor/buffer/chunk_refs.go
          sed -i 's/^package.*/package waiter/g' gvisor/waiter/waiter_list.go

          # Crucial Fix: Erase 'vlist.', 'ilist.', and 'refs.' ghosts that cause compilation loops
          sed -i 's/vlist\.//g' gvisor/buffer/view_list.go
          sed -i 's/ilist\.//g' gvisor/buffer/view_list.go
          sed -i 's/ilist\.//g' gvisor/waiter/waiter_list.go
          sed -i 's/refs\.//g' gvisor/buffer/chunk_refs.go

          # Case Alignment Fix: Ensure generated waiter types match the lowercase expectations of waiter.go
          sed -i 's/WaiterEntry/waiterEntry/g' gvisor/waiter/waiter_list.go
          sed -i 's/WaiterList/waiterList/g' gvisor/waiter/waiter_list.go

          echo "========================================================"
          echo "3. Inject missing infrastructure (primitive.go & AddrRange)"
          echo "========================================================"
          cat << 'EOF' > gvisor/marshal/primitive/primitive.go
          package primitive
          type Int8 int8; type Uint8 uint8; type Int16 int16; type Uint16 uint16
          type Int32 int32; type Uint32 uint32; type Int64 int64; type Uint64 uint64
          func (i *Int8) CopyIn(cc interface{}, src []byte) int { return 0 }; func (u *Uint8) CopyIn(cc interface{}, src []byte) int { return 0 }
          func (i *Int16) CopyIn(cc interface{}, src []byte) int { return 0 }; func (u *Uint16) CopyIn(cc interface{}, src []byte) int { return 0 }
          func (i *Int32) CopyIn(cc interface{}, src []byte) int { return 0 }; func (u *Uint32) CopyIn(cc interface{}, src []byte) int { return 0 }
          func (i *Int64) CopyIn(cc interface{}, src []byte) int { return 0 }; func (u *Uint64) CopyIn(cc interface{}, src []byte) int { return 0 }
          func (i *Int8) MarshalUnsafe(src []byte) []byte { return src }; func (u *Uint8) MarshalUnsafe(src []byte) []byte { return src }
          func (i *Int16) MarshalUnsafe(src []byte) []byte { return src }; func (u *Uint16) MarshalUnsafe(src []byte) []byte { return src }
          func (i *Int32) MarshalUnsafe(src []byte) []byte { return src }; func (u *Uint32) MarshalUnsafe(src []byte) []byte { return src }
          func (i *Int64) MarshalUnsafe(src []byte) []byte { return src }; func (u *Uint64) MarshalUnsafe(src []byte) []byte { return src }
          EOF
          find gvisor/marshal/primitive/ -type f ! -name "primitive.go" -delete

          cat << 'EOF' > gvisor/hostarch/addr_range.go
          package hostarch
          type AddrRange struct { Start Addr; End Addr }
          func (r AddrRange) Length() Addr { if r.End < r.Start { return 0 }; return r.End - r.Start }
          func (r AddrRange) Contains(a Addr) bool { return a >= r.Start && a < r.End }
          func (r AddrRange) IsValid() bool { return r.Start <= r.End }
          func (r AddrRange) Intersect(other AddrRange) AddrRange {
              start := r.Start; if other.Start > start { start = other.Start }; end := r.End; if other.End < end { end = other.End }
              if start < end { return AddrRange{Start: start, End: end} }; return AddrRange{}
          }
          EOF

          echo "========================================================"
          echo "4. Purge unused modules and run final path redirection"
          echo "========================================================"
          find gvisor/ -type f \( -name "*.tmpl" -o -name "*.tmpl.s" -o -name "*_test.go" -o -name "*.pb.go" \) -delete
          rm -rf gvisor/segment gvisor/tcpip/tests gvisor/tcpip/testing gvisor/tcpip/transport/testing gvisor/tcpip/transport/tcp/test gvisor/tcpip/nftables

          find gvisor/bits/ -type f -name "*_template.go" -exec sed -i 's|package bits_template|package bits|g' {} +
          find gvisor/refs/ -type f -name "*_template.go" -exec sed -i 's|package refs_template|package refs|g' {} +
          find gvisor/hostarch/ -type f -name "*.go" -exec sed -i 's|package addr_range|package hostarch|g' {} +

          # Global rewrite of import routing paths to target your local module
          find gvisor/ -type f -name "*.go" -exec sed -i "s|gvisor.dev/gvisor/pkg|${{ env.MODULE_NAME }}/gvisor|g" {} +

          rm -f go_generics

      - name: Clean up temporary source data
        run: |
          rm -rf gvisor_src

      - name: Explicitly fetch standard platform extensions
        run: |
          echo "Fetching remaining standard extensions (golang.org/x/...)..."
          go get golang.org/x/sys
          go get golang.org/x/time
          go get golang.org/x/exp
          
          echo "Running module tree tidying..."
          go mod tidy -v

      - name: Sanity check compilation
        run: |
          echo "Verifying local netstack structure compilation..."
          go build -v ./gvisor/tcpip/... || echo "Notice: Some platform-specific files may need tags or stubs."

      - name: Upload netstack artifact for direct download
        uses: actions/upload-artifact@v4
        with:
          name: gvisor-${{ env.GVISOR_VERSION }}-sanitized-netstack
          path: gvisor/