name: Extract Independent GVisor Netstack

on:
  workflow_dispatch:

env:
  GVISOR_VERSION: "release-20260622.0"
  MODULE_NAME: "github.com/oukishu/onet"

jobs:
  extract-netstack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Clone specific gVisor release branch
        run: |
          echo "Cloning gVisor version: ${{ env.GVISOR_VERSION }}"
          git clone --depth 1 --branch ${{ env.GVISOR_VERSION }} https://github.com/google/gvisor.git gvisor_src

      - name: Extract required core packages
        run: |
          mkdir -p gvisor
          CORE_PKGS=(
            "tcpip" "buffer" "atomicbitops" "waiter" "log" "ilist" "sync"
            "gohacks" "bits" "rand" "linewriter" "sleep" "rawfile" 
            "cleanup" "eventfd" "memutil" "context" "errors" "xdp" 
            "abi" "marshal" "sentry" "syserr" "refs" "hostarch" "safecopy"
            "sighandling"
          )
          
          for pkg in "${CORE_PKGS[@]}"; do
            if [ -d "gvisor_src/pkg/$pkg" ]; then
              echo "Extracting pkg/$pkg -> gvisor/$pkg"
              cp -r gvisor_src/pkg/$pkg gvisor/
            else
              echo "Warning: pkg/$pkg not found in source!"
            fi
          done

      - name: Clone and localized btree and go-cmp
        run: |
          echo "Cloning btree into gvisor/btree..."
          git clone --depth 1 https://github.com/google/btree.git gvisor/btree
          rm -rf gvisor/btree/.git gvisor/btree/*_test.go
          
          echo "Cloning go-cmp into gvisor/go-cmp..."
          git clone --depth 1 https://github.com/google/go-cmp.git gvisor/go-cmp
          rm -rf gvisor/go-cmp/.git gvisor/go-cmp/*_test.go

      - name: Clean up temporary source data
        run: |
          rm -rf gvisor_src

      - name: Purge tests and multi-package contamination
        run: |
          echo "Purging unit tests, internal integration tests and templates..."
          find gvisor/ -type f -name "*_test.go" -delete
          find gvisor/ -type f -name "*_template.go" -delete
          
          rm -rf gvisor/tcpip/tests
          rm -rf gvisor/tcpip/testing
          rm -rf gvisor/tcpip/transport/testing
          rm -rf gvisor/tcpip/transport/tcp/test

      - name: Repair and replace package import paths
        run: |
          echo "Detected local module name: ${{ env.MODULE_NAME }}"
          
          TARGET_DIR="gvisor"
          
          echo "Replacing gvisor.dev/gvisor/pkg with ${{ env.MODULE_NAME }}/gvisor..."
          find "$TARGET_DIR" -type f -name "*.go" -exec sed -i "s|gvisor.dev/gvisor/pkg|${{ env.MODULE_NAME }}/gvisor|g" {} +
          
          echo "Redirecting github.com/google/btree to ${{ env.MODULE_NAME }}/gvisor/btree..."
          find "$TARGET_DIR" -type f -name "*.go" -exec sed -i "s|github.com/google/btree|${{ env.MODULE_NAME }}/gvisor/btree|g" {} +
          
          echo "Redirecting github.com/google/go-cmp to ${{ env.MODULE_NAME }}/gvisor/go-cmp..."
          find "$TARGET_DIR" -type f -name "*.go" -exec sed -i "s|github.com/google/go-cmp|${{ env.MODULE_NAME }}/gvisor/go-cmp|g" {} +

      - name: Explicitly fetch standard platform extensions
        run: |
          echo "Fetching remaining standard extensions (golang.org/x/...)..."
          go get golang.org/x/sys
          go get golang.org/x/time
          go get golang.org/x/exp
          
          echo "Running module tree tidying..."
          go mod tidy -v

      - name: Sanity check compilation
        run: |
          echo "Verifying local netstack structure compilation..."
          go build -v ./gvisor/tcpip/... || echo "Notice: Some platform-specific files may need tags or stubs."

      - name: Upload netstack artifact for direct download
        uses: actions/upload-artifact@v4
        with:
          name: gvisor-${{ env.GVISOR_VERSION }}-sanitized-netstack
          path: gvisor/