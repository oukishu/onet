name: Extract Independent GVisor Netstack

on:
  workflow_dispatch:

env:
  GVISOR_VERSION: "release-20260622.0"
  MODULE_NAME: "github.com/oukishu/onet"

jobs:
  extract-netstack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Install System Build Dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo -E apt update
          sudo -E apt install -y make git crossbuild-essential-arm64

      - name: Clone specific gVisor release branch (Full History)
        run: |
          echo "Cloning gVisor version: ${{ env.GVISOR_VERSION }}"
          # CRITICAL: Do NOT use --depth 1. The go_branch.sh script requires full 
          # git history to handle internal branch cuts and code isolation.
          git clone --branch ${{ env.GVISOR_VERSION }} https://github.com/google/gvisor.git gvisor_src

      - name: Pre-configure Git for gVisor Automation Script
        run: |
          # The official script creates a local commit. Fake identity details are required 
          # to prevent git from blocking the process with an unconfigured identity panic.
          cd gvisor_src
          git config --local user.email "agent@github.com"
          git config --local user.name "Automated Generator"

      - name: Run official gVisor Go branch generator
        run: |
          echo "========================================================"
          echo "Running official toolchain to auto-generate all Mutex, RWMutex, List & Marshallers"
          echo "========================================================"
          cd gvisor_src
          
          # Executes the automated script to build and run internal code generation utilities[cite: 2]
          bash tools/go_branch.sh
          
          # All compilation-ready pure Go code is dumped cleanly into the local 'go' branch[cite: 2]
          git checkout go
          git clean -xf .
          cd ..

      - name: Extract required core packages
        run: |
          rm -rf gvisor
          mkdir -p gvisor
          
          # Extracts the generated codebase targeting your custom package set[cite: 2]
          CORE_PKGS=(
            "tcpip" "buffer" "atomicbitops" "waiter" "log" "sync"
            "gohacks" "bits" "rand" "linewriter" "sleep" "rawfile" 
            "cleanup" "eventfd" "memutil" "context" "errors" "xdp" 
            "abi" "marshal" "syserr" "refs" "hostarch" "safecopy"
            "sighandling" "sentry/uniqueid" "cpuid" "goid"
          )
          
          for pkg in "${CORE_PKGS[@]}"; do
            SRC_DIR="gvisor_src/pkg/$pkg"
            DST_DIR="gvisor/$pkg"
            if [ -d "$SRC_DIR" ]; then
              echo "Extracting pkg/$pkg -> $DST_DIR"
              mkdir -p "$DST_DIR"
              cp -r "$SRC_DIR"/. "$DST_DIR/"
            fi
          done

      - name: Clone and localized btree and go-cmp
        run: |
          echo "Cloning btree into gvisor/btree..."
          git clone --depth 1 https://github.com/google/btree.git gvisor/btree
          rm -rf gvisor/btree/.git gvisor/btree/go.mod gvisor/btree/go.sum gvisor/btree/*_test.go
          
          echo "Cloning go-cmp into gvisor/go-cmp..."
          git clone --depth 1 https://github.com/google/go-cmp.git gvisor/go-cmp
          rm -rf gvisor/go-cmp/.git gvisor/go-cmp/go.mod gvisor/go-cmp/go.sum gvisor/go-cmp/*_test.go

      - name: Global Repair and replace package import paths
        run: |
          echo "========================================================"
          echo "Purging redundant tests and redirecting local module imports"
          echo "========================================================"
          # Strip unnecessary test frameworks and template sources
          find gvisor/ -type f \( -name "*.tmpl" -o -name "*.tmpl.s" -o -name "*_test.go" -o -name "*.pb.go" \) -delete
          rm -rf gvisor/segment gvisor/tcpip/tests gvisor/tcpip/testing gvisor/tcpip/transport/testing gvisor/tcpip/transport/tcp/test gvisor/tcpip/nftables
          rm -rf gvisor/ilist

          # Redirect absolute gVisor import paths to match your local package target[cite: 1]
          TARGET_DIR="gvisor"
          find "$TARGET_DIR" -type f -name "*.go" -exec sed -i "s|gvisor.dev/gvisor/pkg|${{ env.MODULE_NAME }}/gvisor|g" {} +
          find "$TARGET_DIR" -type f -name "*.go" -exec sed -i "s|github.com/google/btree|${{ env.MODULE_NAME }}/gvisor/btree|g" {} +
          find "$TARGET_DIR" -type f -name "*.go" -exec sed -i "s|github.com/google/go-cmp|${{ env.MODULE_NAME }}/gvisor/go-cmp|g" {} +

      - name: Clean up temporary source data
        run: |
          rm -rf gvisor_src

      - name: Explicitly fetch standard platform extensions
        run: |
          echo "Fetching remaining standard extensions (golang.org/x/...)..."
          go get golang.org/x/sys
          go get golang.org/x/time
          go get golang.org/x/exp
          
          echo "Running module tree tidying..."
          go mod tidy -v

      - name: Sanity check compilation
        run: |
          echo "Verifying local netstack structure compilation..."
          go build -v ./gvisor/tcpip/...

      - name: Upload netstack artifact for direct download
        uses: actions/upload-artifact@v4
        with:
          name: gvisor-${{ env.GVISOR_VERSION }}-sanitized-netstack
          path: gvisor/