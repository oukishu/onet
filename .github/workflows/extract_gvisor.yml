name: Extract Independent GVisor Netstack

on:
  workflow_dispatch:

env:
  GVISOR_VERSION: "release-20260622.0"
  MODULE_NAME: "github.com/oukishu/onet"

jobs:
  extract-netstack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4

      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Clone specific gVisor release branch
        run: |
          echo "Cloning gVisor version: ${{ env.GVISOR_VERSION }}"
          git clone --depth 1 --branch ${{ env.GVISOR_VERSION }} https://github.com/google/gvisor.git gvisor_src

      - name: Extract required core packages
        run: |
          rm -rf gvisor
          mkdir -p gvisor
          CORE_PKGS=(
            "tcpip" "buffer" "atomicbitops" "waiter" "log" "ilist" "sync"
            "gohacks" "bits" "rand" "linewriter" "sleep" "rawfile" 
            "cleanup" "eventfd" "memutil" "context" "errors" "xdp" 
            "abi" "marshal" "syserr" "refs" "hostarch" "safecopy"
            "sighandling" "sentry/uniqueid" "cpuid" "goid" "segment"
          )
          
          for pkg in "${CORE_PKGS[@]}"; do
            SRC_DIR="gvisor_src/pkg/$pkg"
            DST_DIR="gvisor/$pkg"
            if [ -d "$SRC_DIR" ]; then
              echo "Extracting pkg/$pkg -> $DST_DIR"
              mkdir -p "$DST_DIR"
              cp -r "$SRC_DIR"/. "$DST_DIR/"
            fi
          done

      - name: Clone and localized btree and go-cmp
        run: |
          echo "Cloning btree into gvisor/btree..."
          git clone --depth 1 https://github.com/google/btree.git gvisor/btree
          rm -rf gvisor/btree/.git gvisor/btree/go.mod gvisor/btree/go.sum gvisor/btree/*_test.go
          
          echo "Cloning go-cmp into gvisor/go-cmp..."
          git clone --depth 1 https://github.com/google/go-cmp.git gvisor/go-cmp
          rm -rf gvisor/go-cmp/.git gvisor/go-cmp/go.mod gvisor/go-cmp/go.sum gvisor/go-cmp/*_test.go

      - name: Global Repair and replace package import paths
        run: |
          echo "Executing global framework redirection to local module: ${{ env.MODULE_NAME }}"
          TARGET_DIR="gvisor"
          find "$TARGET_DIR" -type f -name "*.go" -exec sed -i "s|gvisor.dev/gvisor/pkg|${{ env.MODULE_NAME }}/gvisor|g" {} +
          find "$TARGET_DIR" -type f -name "*.go" -exec sed -i "s|github.com/google/btree|${{ env.MODULE_NAME }}/gvisor/btree|g" {} +
          find "$TARGET_DIR" -type f -name "*.go" -exec sed -i "s|github.com/google/go-cmp|${{ env.MODULE_NAME }}/gvisor/go-cmp|g" {} +

      - name: Build go_generics tool and run full instantiation
        run: |
          echo "Building gVisor go_generics tool..."
          cd gvisor_src/tools/go_generics
          go build -o ../../../go_generics .
          cd ../../../

          echo "========================================================"
          echo "1. Machine Generation: Run pure go_generics instantiation"
          echo "========================================================"
          # IMPORTANT: gVisor's real build (see each package's BUILD file,
          # go_template_instance rules) drives these instantiations with the
          # "-prefix" flag, not by mapping the template's own container types
          # (List/Entry/Range/Refs) through "-t". Passing a container type
          # through "-t" tells go_generics that type is a pre-existing
          # *placeholder* to be deleted and replaced -- it strips that type's
          # entire method set from the output. Since List/Entry/Range/Refs
          # carry the actual generic implementation (not placeholders like
          # Element/Linker/T are), mapping them via "-t" silently produces a
          # near-empty file (it will exit 0, so this is easy to miss). Only
          # genuine placeholder types (Element, Linker, T) belong on "-t";
          # everything else should be renamed via "-prefix".

          # Instantiate buffer/view_list.go -> maps pointer element receivers
          # (matches pkg/buffer/BUILD: go_template_instance "view_list", prefix="View")
          ./go_generics -i gvisor_src/pkg/ilist/list.go -o gvisor/buffer/view_list.go -p buffer -prefix View -t "Element=*View" -t "Linker=*View"

          # Instantiate buffer/chunk_refs.go -> internal reference counting.
          # Note the source is refs_template.go (the actual go_template),
          # not refcounter.go (which is refs' own already-instantiated code
          # and isn't a valid template input).
          # (matches pkg/buffer/BUILD: go_template_instance "chunk_refs", prefix="chunk")
          ./go_generics -i gvisor_src/pkg/refs/refs_template.go -o gvisor/buffer/chunk_refs.go -p buffer -prefix chunk -t "T=chunk"

          # Instantiate waiter/waiter_list.go -> dual-linked structural elements
          # (matches pkg/waiter/BUILD: go_template_instance "waiter_list", prefix="waiter")
          ./go_generics -i gvisor_src/pkg/ilist/list.go -o gvisor/waiter/waiter_list.go -p waiter -prefix waiter -t "Element=*Entry" -t "Linker=*Entry"

          # Instantiate hostarch/addr_range.go -> AddrRange, used throughout
          # hostarch/addr.go and addr_range_seq_unsafe.go. This type is
          # generated (not checked into the gVisor repo as source), which is
          # why it was previously missing entirely rather than just broken.
          # (matches pkg/hostarch/BUILD: go_template_instance "addr_range", prefix="Addr")
          ./go_generics -i gvisor_src/pkg/segment/range.go -o gvisor/hostarch/addr_range.go -p hostarch -prefix Addr -t "T=Addr"

          echo "========================================================"
          echo "2. Purge unused test architectures and execute redirection"
          echo "========================================================"
          find gvisor/ -type f \( -name "*.tmpl" -o -name "*.tmpl.s" -o -name "*_test.go" -o -name "*.pb.go" \) -delete
          rm -rf gvisor/segment gvisor/tcpip/tests gvisor/tcpip/testing gvisor/tcpip/transport/testing gvisor/tcpip/transport/tcp/test gvisor/tcpip/nftables

          # ilist/list.go and ilist/ring.go are ONLY used as go_generics
          # template inputs in real gVisor (via the //pkg/ilist:generic_list
          # and :generic_ring bazel targets) -- nothing actually imports the
          # "ilist" package itself (grep the whole tree: no hits). Worse, the
          # directory mixes two different package declarations (list.go is
          # "package ilist", ring.go is "package ring"), which plain `go
          # build` rejects outright. Generation above already sources
          # directly from gvisor_src, so drop the extracted copy entirely.
          rm -rf gvisor/ilist

          # bits_template.go already declares "package bits" in upstream
          # source (it's real Go 1.18+ generics, unrelated to the
          # go_generics tool), so this rename is a no-op left in place for
          # safety.
          find gvisor/bits/ -type f -name "*_template.go" -exec sed -i 's|package bits_template|package bits|g' {} +

          # refs_template.go and sync/locking's generic_mutex.go /
          # generic_rwmutex.go are go_generics TEMPLATE-ONLY files in real
          # gVisor (separate go_template bazel targets) -- they are never
          # part of the compiled refs / locking go_library, and each already
          # self-imports its own package path as part of being a template.
          # Renaming refs_template.go's package to "refs" (the old approach)
          # makes it a real member of the refs package, which then imports
          # itself -- "import cycle not allowed". The generic_mutex/rwmutex
          # files have the same self-import problem out of the box, since
          # they already say "package locking". Since generation above
          # already sources refs_template.go directly from gvisor_src, drop
          # these extracted copies instead of trying to fold them in.
          rm -f gvisor/refs/refs_template.go
          rm -f gvisor/sync/locking/generic_mutex.go gvisor/sync/locking/generic_rwmutex.go

          find gvisor/hostarch/ -type f -name "*.go" -exec sed -i 's|package addr_range|package hostarch|g' {} +

          # Global path rewrite targeting your local Go module destination
          find gvisor/ -type f -name "*.go" -exec sed -i "s|gvisor.dev/gvisor/pkg|${{ env.MODULE_NAME }}/gvisor|g" {} +

          rm -f go_generics

      - name: Clean up temporary source data
        run: |
          rm -rf gvisor_src

      - name: Explicitly fetch standard platform extensions
        run: |
          echo "Fetching remaining standard extensions (golang.org/x/...)..."
          go get golang.org/x/sys
          go get golang.org/x/time
          go get golang.org/x/exp
          
          echo "Running module tree tidying..."
          go mod tidy -v

      - name: Sanity check compilation
        run: |
          echo "Verifying local netstack structure compilation..."
          go build -v ./gvisor/tcpip/... || echo "Notice: Some platform-specific files may need tags or stubs."

      - name: Upload netstack artifact for direct download
        uses: actions/upload-artifact@v4
        with:
          name: gvisor-${{ env.GVISOR_VERSION }}-sanitized-netstack
          path: gvisor/